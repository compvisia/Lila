name: Engine Build Check

on:
  push:
    branches: ["master", "dev", "feat/*", "fix/*"]
  pull_request:
    branches: ["master", "dev"]
  workflow_dispatch:

jobs:
  build-windows:
    name: ${{ matrix.os }} MSVC (${{ matrix.config }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-2022, windows-2025-vs2026 ]
        config: [Debug, Release]
    steps:
      - uses: actions/checkout@v4
    
      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ matrix.config }} -DSTRICT_MODE=ON
        
      - name: Build Engine
        run: cmake --build build --config ${{ matrix.config }} -- /m
        
  build-linux:
    name: ubuntu-24.04 ${{ matrix.compiler }} (${{ matrix.config }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]
        compiler: [gcc, clang]
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xorg-dev libgl1-mesa-dev
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            sudo apt-get install -y clang-17 clang++-17 libc++-dev libc++abi-dev
            echo "CC=clang-17" >> $GITHUB_ENV
            echo "CXX=clang++-17" >> $GITHUB_ENV
          else
            sudo apt-get install -y g++-14
            echo "CC=gcc-14" >> $GITHUB_ENV
            echo "CXX=g++-14" >> $GITHUB_ENV
          fi
          
      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ matrix.config }} -DSTRICT_MODE=ON

      - name: Build Engine
        run: cmake --build build --config ${{ matrix.config }} -- -j$(nproc)
